<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Autovaluator System Access — Authentication required for predictive engine.">
    <title>System Access — Autovaluator</title>
    <link rel="stylesheet" href="/static/styles.css?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* No scroll on login page */
        body { overflow: hidden; height: 100vh; }
        .auth-wrapper { height: calc(100vh - 68px); display: flex; align-items: center; justify-content: center; }
        /* WebGL Shader Background Canvas */
        #login-shader-bg {
            position: fixed;
            inset: 0;
            z-index: -10;
        }
        #login-shader-bg canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <!-- Cursor spotlight -->
    <div class="cursor-spotlight" aria-hidden="true"></div>

    <!-- WebGL Shader Background -->
    <div id="login-shader-bg"></div>

    <!-- Minimal Navbar -->
    <header class="navbar" style="border: none; background: var(--bg-base);" aria-label="Site header">
        <a href="/" class="brand">
            <div class="brand-mark"></div>
            AUTOVALUATOR
        </a>
    </header>

    <!-- Auth Panel -->
    <main class="auth-wrapper" role="main">
        <div class="auth-panel anim-reveal" role="form" aria-label="Authentication form">

            <div class="auth-header">
                <h1>Login<span class="accent-teal">.</span></h1>
                <p>ENTER YOUR CREDENTIALS TO ACCESS THE VALUATION ENGINE</p>
            </div>

            <form id="login-form" novalidate>

                <div class="vault-form-group">
                    <input type="text" id="login-username" class="vault-input" placeholder=" " required
                        autocomplete="username" aria-label="Username">
                    <label class="vault-label" for="login-username">USERNAME</label>
                </div>

                <div class="vault-form-group password-wrapper">
                    <input type="password" id="login-password" class="vault-input" placeholder=" " required
                        autocomplete="current-password" aria-label="Password">
                    <label class="vault-label" for="login-password">PASSWORD</label>
                    <button type="button" class="pw-toggle" id="pw-toggle-btn" aria-label="Show/hide password">
                        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>

                <div style="margin-top: var(--sp-xl);">
                    <div class="magnetic-btn-container" style="width: 100%;">
                        <button type="submit" class="cta-btn w-full">
                            <span class="btn-label">
                                <span>Access System</span>
                                <span class="btn-arrow">&rarr;</span>
                            </span>
                        </button>
                    </div>
                    <div id="login-error" class="error-msg" role="alert" aria-live="polite"></div>
                </div>

            </form>

            <!-- Default credentials hint -->
            <div style="
                text-align: center;
                margin-top: var(--sp-lg);
                padding-top: var(--sp-md);
                border-top: 1px solid var(--border-subtle);
                font-family: var(--font-mono);
                font-size: 0.7rem;
                color: var(--text-secondary);
                letter-spacing: 0.12em;
            ">
                SYS_DEFAULT&nbsp;&nbsp;/&nbsp;&nbsp;admin&nbsp;:&nbsp;admin
            </div>

        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        /* ── Liquid Obsidian GLSL Shader Background ─────────────────── */
        (function() {
            const container = document.getElementById('login-shader-bg');
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            let mouseX = 0.5, mouseY = 0.5;
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX / window.innerWidth;
                mouseY = 1.0 - (e.clientY / window.innerHeight);
            });

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;
                uniform vec2 u_mouse;

                vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
                vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
                float snoise(vec3 v){
                    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                    vec3 i  = floor(v + dot(v, C.yyy));
                    vec3 x0 = v - i + dot(i, C.xxx);
                    vec3 g = step(x0.yzx, x0.xyz);
                    vec3 l = 1.0 - g;
                    vec3 i1 = min(g.xyz, l.zxy);
                    vec3 i2 = max(g.xyz, l.zxy);
                    vec3 x1 = x0 - i1 + C.xxx;
                    vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                    vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
                    i = mod(i, 289.0);
                    vec4 p = permute(permute(permute(
                               i.z + vec4(0.0, i1.z, i2.z, 1.0))
                             + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                             + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                    float n_ = 1.0/7.0;
                    vec3 ns = n_ * D.wyz - D.xzx;
                    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                    vec4 x_ = floor(j * ns.z);
                    vec4 y_ = floor(j - 7.0 * x_);
                    vec4 x = x_ * ns.x + ns.yyyy;
                    vec4 y = y_ * ns.x + ns.yyyy;
                    vec4 h = 1.0 - abs(x) - abs(y);
                    vec4 b0 = vec4(x.xy, y.xy);
                    vec4 b1 = vec4(x.zw, y.zw);
                    vec4 s0 = floor(b0)*2.0 + 1.0;
                    vec4 s1 = floor(b1)*2.0 + 1.0;
                    vec4 sh = -step(h, vec4(0.0));
                    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                    vec3 p0 = vec3(a0.xy,h.x);
                    vec3 p1 = vec3(a0.zw,h.y);
                    vec3 p2 = vec3(a1.xy,h.z);
                    vec3 p3 = vec3(a1.zw,h.w);
                    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                    m = m * m;
                    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    uv.x *= u_resolution.x / u_resolution.y;

                    // Enhanced mouse interaction
                    vec2 mouse = u_mouse * vec2(u_resolution.x/u_resolution.y, 1.0);
                    float dist = length(uv - mouse);
                    float interact = exp(-dist * 3.0);

                    // Multi-octave noise
                    float t = u_time * 0.15;
                    // Mouse distorts the noise field
                    vec2 warpedUV = uv + vec2(interact * 0.15 * sin(u_time), interact * 0.15 * cos(u_time));
                    float n = snoise(vec3(warpedUV * 1.5, t));
                    n += 0.5 * snoise(vec3(warpedUV * 3.0 - vec2(t, t), t * 1.5));
                    n += 0.25 * snoise(vec3(warpedUV * 6.0, t * 2.0));
                    n = n * 0.5 + 0.5;

                    // Colors
                    vec3 dark = vec3(0.03, 0.03, 0.03);
                    vec3 crimson = vec3(0.9, 0.16, 0.2);
                    vec3 shadow = vec3(0.1, 0.02, 0.03);

                    // Liquid effect mapping
                    vec3 col = mix(dark, shadow, smoothstep(0.2, 0.8, n));
                    // Highlight ridges with enhanced interactivity
                    float edge = smoothstep(0.4, 0.5, n) - smoothstep(0.5, 0.6, n);
                    col += crimson * edge * (0.8 + interact * 2.5);
                    // Mouse proximity glow
                    col += crimson * interact * 0.15;

                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const geometry = new THREE.PlaneGeometry(2, 2);
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    u_time: { value: 0 },
                    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    u_mouse: { value: new THREE.Vector2(0.5, 0.5) }
                },
                vertexShader: 'void main() { gl_Position = vec4(position, 1.0); }',
                fragmentShader: fragmentShader
            });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const startTime = Date.now();
            function render() {
                requestAnimationFrame(render);
                material.uniforms.u_time.value = (Date.now() - startTime) / 1000.0;
                material.uniforms.u_mouse.value.x += (mouseX - material.uniforms.u_mouse.value.x) * 0.05;
                material.uniforms.u_mouse.value.y += (mouseY - material.uniforms.u_mouse.value.y) * 0.05;
                renderer.render(scene, camera);
            }
            render();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* Redirect if already authenticated */
            const token = localStorage.getItem('autovaluator_token');
            if (token) {
                window.location.href = '/dashboard';
                return;
            }

            /* ── Password toggle ─────────────────────────────── */
            const pwInput = document.getElementById('login-password');
            const pwToggle = document.getElementById('pw-toggle-btn');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeSlash = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;

            pwToggle.addEventListener('click', () => {
                const isPassword = pwInput.type === 'password';
                pwInput.type = isPassword ? 'text' : 'password';
                eyeIcon.innerHTML = isPassword ? eyeSlash : eyeOpen;
            });

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                const errorDiv = document.getElementById('login-error');
                const btn = e.target.querySelector('button[type="submit"]');

                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
                errorDiv.textContent = '';

                try {
                    const response = await fetch(`${window.location.origin}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await response.json();

                    if (data.access_token) {
                        localStorage.setItem('autovaluator_token', data.access_token);
                        localStorage.setItem('autovaluator_user', username);
                        window.location.href = '/dashboard';
                    } else {
                        errorDiv.textContent = data.error || 'AUTHORIZATION DECLINED';
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                    }
                } catch (err) {
                    errorDiv.textContent = 'CONNECTION SEVERED';
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }
            });
        });
    </script>
</body>

</html>
